<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goodbye World</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --button: #111827;
        --buttonText: #ffffff;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }
      main {
        max-width: 720px;
        padding: 28px 16px;
        margin: 0 auto;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 6px;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
      }
      form {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 10px;
        align-items: end;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      input {
        font-size: 14px;
        padding: 10px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        outline: none;
      }
      button {
        height: 40px;
        padding: 0 14px;
        border-radius: 8px;
        border: 1px solid var(--button);
        background: var(--button);
        color: var(--buttonText);
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .card {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child {
        border-bottom: none;
      }
      .who {
        font-weight: 600;
      }
      .when {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }
      .error {
        color: #b91c1c;
        margin-top: 10px;
      }
      .chat {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }
      .chat-log {
        display: flex;
        flex-direction: column;
        gap: 8px;
        height: 260px;
        overflow: auto;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fafafa;
      }
      .bubble {
        max-width: 85%;
        padding: 10px;
        border-radius: 10px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .bubble.user {
        align-self: flex-start;
        background: #ffffff;
        border: 1px solid var(--border);
      }
      .bubble.ai {
        align-self: flex-end;
        background: #111827;
        color: #ffffff;
      }
      .chat-form {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Goodbye World</h1>
      <p>Save a name + family name into a SQLite database.</p>

      <form id="personForm">
        <label>
          Name
          <input id="name" name="name" autocomplete="given-name" required />
        </label>
        <label>
          Family name
          <input
            id="familyName"
            name="familyName"
            autocomplete="family-name"
            required
          />
        </label>
        <button id="saveBtn" type="submit">Save</button>
      </form>

      <div id="error" class="error" role="alert" aria-live="polite"></div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; gap: 12px">
          <div style="font-weight: 700">Saved people</div>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <div id="list" style="margin-top: 10px"></div>
      </div>

      <div class="chat">
        <div style="display: flex; justify-content: space-between; gap: 12px">
          <div style="font-weight: 700">Chatbot</div>
          <button id="chatResetBtn" type="button">Reset</button>
        </div>
        <p style="margin: 8px 0 10px">
          The bot turns whatever you say into a joke.
        </p>
        <div id="chatLog" class="chat-log" aria-live="polite"></div>
        <form id="chatForm" class="chat-form">
          <input
            id="chatInput"
            placeholder="Type a message…"
            autocomplete="off"
          />
          <button id="chatSendBtn" type="submit">Send</button>
          <button id="chatRefreshBtn" type="button">Load</button>
        </form>
        <div id="chatError" class="error" role="alert" aria-live="polite"></div>
      </div>
    </main>

    <script>
      const form = document.getElementById("personForm");
      const nameInput = document.getElementById("name");
      const familyNameInput = document.getElementById("familyName");
      const saveBtn = document.getElementById("saveBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const list = document.getElementById("list");
      const errorEl = document.getElementById("error");

      function setError(msg) {
        errorEl.textContent = msg || "";
      }

      function formatWhen(iso) {
        try {
          return new Date(iso).toLocaleString();
        } catch {
          return iso;
        }
      }

      async function loadPeople() {
        setError("");
        const res = await fetch("/api/people");
        const data = await res.json();
        const people = data.people || [];

        if (!people.length) {
          list.innerHTML =
            '<div style="color: var(--muted); font-size: 13px;">No entries yet.</div>';
          return;
        }

        list.innerHTML = people
          .map(
            (p) => `
              <div class="row">
                <div class="who">${escapeHtml(p.name)} ${escapeHtml(
              p.familyName
            )}</div>
                <div class="when">${escapeHtml(formatWhen(p.createdAt))}</div>
              </div>
            `
          )
          .join("");
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => {
          switch (c) {
            case "&":
              return "&amp;";
            case "<":
              return "&lt;";
            case ">":
              return "&gt;";
            case '"':
              return "&quot;";
            case "'":
              return "&#39;";
            default:
              return c;
          }
        });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        setError("");

        const name = nameInput.value.trim();
        const familyName = familyNameInput.value.trim();
        if (!name || !familyName) return;

        saveBtn.disabled = true;
        try {
          const res = await fetch("/api/people", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ name, familyName })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || "Failed to save.");

          nameInput.value = "";
          familyNameInput.value = "";
          nameInput.focus();
          await loadPeople();
        } catch (err) {
          setError(err?.message || String(err));
        } finally {
          saveBtn.disabled = false;
        }
      });

      refreshBtn.addEventListener("click", loadPeople);
      loadPeople();

      // ----------------
      // Chatbot
      // ----------------
      const chatLog = document.getElementById("chatLog");
      const chatForm = document.getElementById("chatForm");
      const chatInput = document.getElementById("chatInput");
      const chatSendBtn = document.getElementById("chatSendBtn");
      const chatRefreshBtn = document.getElementById("chatRefreshBtn");
      const chatResetBtn = document.getElementById("chatResetBtn");
      const chatError = document.getElementById("chatError");

      function setChatError(msg) {
        chatError.textContent = msg || "";
      }

      function renderChat(messages) {
        chatLog.innerHTML = (messages || [])
          .map((m) => {
            const cls = m.role === "user" ? "user" : "ai";
            const who = m.role === "user" ? "Me" : "AI";
            return `<div class="bubble ${cls}"><b>${who}:</b> ${escapeHtml(
              m.content
            )}</div>`;
          })
          .join("");
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      async function loadChat() {
        setChatError("");
        const res = await fetch("/api/chat");
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Failed to load chat.");
        renderChat(data.messages || []);
      }

      async function resetChat() {
        setChatError("");
        const res = await fetch("/api/chat/reset", { method: "POST" });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Failed to reset chat.");
        await loadChat();
      }

      chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        setChatError("");
        const message = chatInput.value.trim();
        if (!message) return;

        chatSendBtn.disabled = true;
        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ message })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || "Chat failed.");
          chatInput.value = "";
          renderChat(data.messages || []);
        } catch (err) {
          setChatError(err?.message || String(err));
        } finally {
          chatSendBtn.disabled = false;
          chatInput.focus();
        }
      });

      chatRefreshBtn.addEventListener("click", () =>
        loadChat().catch((e) => setChatError(e?.message || String(e)))
      );
      chatResetBtn.addEventListener("click", () =>
        resetChat().catch((e) => setChatError(e?.message || String(e)))
      );
      loadChat().catch((e) => setChatError(e?.message || String(e)));
    </script>
  </body>
</html>
